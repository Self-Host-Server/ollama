name: Jarvis AI Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  jarvis:
    name: Run Jarvis AI Tests
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Check Ollama is reachable
        run: curl -sf http://localhost:11434 > /dev/null

      - name: List available models
        run: curl -s http://localhost:11434/api/tags | python3 -m json.tool

      - name: Run Jarvis tests
        run: |
          echo "Jarvis tests will run here"
